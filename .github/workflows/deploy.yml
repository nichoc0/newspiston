name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Stop any existing containers
            cd /opt/newspiston 2>/dev/null && sudo docker compose down 2>/dev/null || true
            
            # Create directory
            sudo mkdir -p /opt/newspiston
            sudo chown -R opc:opc /opt/newspiston
            
            # Install nginx if not present
            if ! command -v nginx &> /dev/null; then
              sudo dnf install -y nginx
              sudo systemctl enable nginx
            fi

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "index.html,styles.css,app.js,content/"
          target: /opt/newspiston
          overwrite: true
          strip_components: 0

      - name: Configure and restart nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Copy files to nginx directory
            sudo cp -r /opt/newspiston/* /usr/share/nginx/html/
            sudo chown -R nginx:nginx /usr/share/nginx/html
            
            # Configure nginx
            sudo tee /etc/nginx/conf.d/default.conf > /dev/null << 'EOF'
            server {
                listen 80;
                server_name localhost;
                root /usr/share/nginx/html;
                index index.html;
                
                location / {
                    try_files $uri $uri/ /index.html;
                }
                
                location /content/ {
                    add_header Cache-Control "no-cache, no-store, must-revalidate";
                    add_header Pragma "no-cache";
                    add_header Expires "0";
                }
                
                gzip on;
                gzip_types text/plain text/css application/json application/javascript;
            }
            EOF
            
            # Test and restart
            sudo nginx -t && sudo systemctl restart nginx
            
            # Verify
            echo "=== Verifying deployment ==="
            ls -la /usr/share/nginx/html/content/
            curl -s http://localhost/content/2026-02-24.json | head -5