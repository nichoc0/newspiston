name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "index.html,styles.css,app.js,content"
          target: /opt/newspiston
          overwrite: true

      - name: Start simple HTTP server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Kill any existing server
            pkill -f "python.*http.server" || true
            
            # Verify files
            ls -la /opt/newspiston/
            ls -la /opt/newspiston/content/
            
            # Start Python HTTP server on port 8080
            cd /opt/newspiston
            nohup python3 -m http.server 8080 > /tmp/server.log 2>&1 &
            sleep 2
            
            # Test
            curl -s http://localhost:8080/content/2026-02-24.json | head -3
            echo "Server started on port 8080"