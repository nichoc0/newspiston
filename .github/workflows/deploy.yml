name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Install nginx if not present
            if ! command -v nginx &> /dev/null; then
              sudo dnf install -y nginx
              sudo systemctl enable nginx
            fi
            
            # Create temp directory
            sudo mkdir -p /tmp/newspiston-deploy
            sudo rm -rf /tmp/newspiston-deploy/*

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "index.html,styles.css,app.js,content"
          target: /tmp/newspiston-deploy
          overwrite: true

      - name: Deploy to nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== Source files ==="
            ls -la /tmp/newspiston-deploy/
            ls -la /tmp/newspiston-deploy/content/
            
            # Clean and copy to nginx
            sudo rm -rf /usr/share/nginx/html/*
            sudo cp -r /tmp/newspiston-deploy/* /usr/share/nginx/html/
            sudo chown -R nginx:nginx /usr/share/nginx/html
            
            echo "=== Deployed files ==="
            ls -la /usr/share/nginx/html/
            ls -la /usr/share/nginx/html/content/
            
            # Configure nginx
            sudo tee /etc/nginx/conf.d/default.conf > /dev/null << 'EOF'
            server {
                listen 80;
                server_name localhost;
                root /usr/share/nginx/html;
                index index.html;
                
                location / {
                    try_files $uri $uri/ =404;
                }
                
                location /content/ {
                    add_header Cache-Control "no-cache, no-store, must-revalidate";
                }
                
                gzip on;
                gzip_types text/css application/json application/javascript;
            }
            EOF
            
            sudo nginx -t && sudo systemctl restart nginx
            
            echo "=== Testing ==="
            curl -s http://localhost/content/2026-02-24.json | head -3