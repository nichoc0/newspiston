name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "index.html,styles.css,app.js,content"
          target: /tmp/newspiston
          overwrite: true

      - name: Configure nginx and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Install nginx
            sudo dnf install -y nginx || true
            
            # Deploy files
            sudo mkdir -p /usr/share/nginx/html
            sudo rm -rf /usr/share/nginx/html/*
            sudo cp -r /tmp/newspiston/* /usr/share/nginx/html/
            sudo chown -R nginx:nginx /usr/share/nginx/html
            
            # Simple nginx config
            sudo tee /etc/nginx/nginx.conf > /dev/null << 'EOF'
            user nginx;
            worker_processes auto;
            error_log /var/log/nginx/error.log;
            pid /run/nginx.pid;
            
            events {
                worker_connections 1024;
            }
            
            http {
                log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                                  '$status $body_bytes_sent "$http_referer" '
                                  '"$http_user_agent" "$http_x_forwarded_for"';
                
                access_log  /var/log/nginx/access.log  main;
                
                sendfile            on;
                tcp_nopush          on;
                tcp_nodelay         on;
                keepalive_timeout   65;
                types_hash_max_size 2048;
                
                include             /etc/nginx/mime.types;
                default_type        application/octet-stream;
                
                server {
                    listen       80 default_server;
                    listen       [::]:80 default_server;
                    server_name  _;
                    root         /usr/share/nginx/html;
                    index        index.html;
                    
                    location / {
                        try_files $uri $uri/ =404;
                    }
                    
                    location /content/ {
                        add_header Cache-Control "no-cache";
                    }
                }
            }
            EOF
            
            # Start nginx
            sudo systemctl enable nginx
            sudo systemctl restart nginx
            
            # Verify
            ls -la /usr/share/nginx/html/content/
            curl -s http://localhost/content/2026-02-24.json | head -3