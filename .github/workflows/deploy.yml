name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop containers and copy files
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Stop existing containers first
            cd /opt/newspiston 2>/dev/null && sudo docker compose down || true
            
            # Ensure directory exists
            sudo mkdir -p /opt/newspiston
            sudo chown -R opc:opc /opt/newspiston
            
            # Install docker if needed
            if ! command -v docker &> /dev/null; then
              sudo dnf install -y dnf-utils
              sudo dnf config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo
              sudo dnf install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              sudo systemctl enable --now docker
              sudo usermod -aG docker opc
            fi

      - name: Copy project files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "index.html,styles.css,app.js,content/,Dockerfile,docker-compose.yml"
          target: /opt/newspiston
          overwrite: true

      - name: Build and start containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/newspiston
            # Debug: List all files
            echo "=== Current directory ==="
            ls -la
            echo "=== Content directory ==="
            ls -la content/
            echo "=== Building image ==="
            # Force rebuild with no cache
            sudo docker compose build --no-cache
            echo "=== Starting containers ==="
            sudo docker compose up -d
            echo "=== Verifying content in container ==="
            sleep 3
            sudo docker compose exec -T newspiston ls -la /usr/share/nginx/html/content/
            echo "=== Testing content endpoint ==="
            curl -v http://localhost:8080/content/2026-02-24.json 2>&1 | head -30